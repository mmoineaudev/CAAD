<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antenna CAD - Electromagnetic Simulation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      background-color: #1e1e1e;
      color: #ffffff;
    }
    
    /* Top Toolbar */
    #toolbar {
      height: 50px;
      background-color: #2d2d2d;
      border-bottom: 1px solid #404040;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
    }
    
    .tool-btn {
      padding: 8px 12px;
      background-color: #404040;
      border: 1px solid #505050;
      color: #ffffff;
      cursor: pointer;
      border-radius: 4px;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    
    .tool-btn:hover {
      background-color: #505050;
    }
    
    .tool-btn.active {
      background-color: #0078d4;
      border-color: #0078d4;
    }
    
    .separator {
      width: 1px;
      height: 24px;
      background-color: #505050;
      margin: 0 5px;
    }
    
    .project-info {
      margin-left: auto;
      font-size: 12px;
      color: #aaaaaa;
    }
    
    /* Main layout */
    #main-container {
      display: flex;
      height: calc(100vh - 50px);
    }
    
    /* Left Sidebar */
    #sidebar {
      width: 250px;
      background-color: #252526;
      border-right: 1px solid #404040;
      display: flex;
      flex-direction: column;
    }
    
    #sidebar-header {
      padding: 10px;
      background-color: #2d2d2d;
      border-bottom: 1px solid #404040;
      font-size: 12px;
      font-weight: bold;
      color: #cccccc;
    }
    
    #object-list {
      flex: 1;
      overflow-y: auto;
      padding: 5px;
    }
    
    .object-item {
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
      color: #cccccc;
      transition: background-color 0.2s;
      margin-bottom: 2px;
    }
    
    .object-item:hover {
      background-color: #2a2d2e;
    }
    
    .object-item.selected {
      background-color: #094771;
      color: #ffffff;
    }
    
    .object-item.point {
      color: #4ec9b0;
    }
    
    .object-item.edge {
      color: #ce9178;
    }
    
    .object-item.line {
      color: #569cd6;
    }
    
    .object-item.parallelepiped {
      color: #dcdcaa;
    }
    
    /* Central Viewport */
    #viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-color: #1e1e1e;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #status-bar {
      height: 24px;
      background-color: #007acc;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 11px;
    }
    
    #status-coords {
      color: #ffffff;
    }
    
    /* Info panel for selected objects */
    #info-panel {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background-color: rgba(45, 45, 45, 0.9);
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      color: #cccccc;
      max-width: 250px;
    }
    
    #info-panel h4 {
      margin-bottom: 5px;
      color: #ffffff;
    }
    
    #info-panel p {
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <!-- Top Toolbar -->
  <div id="toolbar">
    <button class="tool-btn" id="btn-new" title="New Project (Ctrl+N)">New</button>
    <button class="tool-btn" id="btn-save" title="Save Project (Ctrl+S)">Save</button>
    <button class="tool-btn" id="btn-load" title="Load Project (Ctrl+O)">Load</button>
    
    <div class="separator"></div>
    
    <button class="tool-btn" id="btn-pick-point" title="Pick Point (P)">Pick Point</button>
    <button class="tool-btn" id="btn-pick-edge" title="Pick Edge (E)">Pick Edge</button>
    
    <div class="separator"></div>
    
    <button class="tool-btn" id="btn-create-line" title="Create Line">Create Line</button>
    <button class="tool-btn" id="btn-create-parallel" title="Create Parallelepiped">Create Box</button>
    <button class="tool-btn" id="btn-create-bbox" title="Create Bounding Box">Bounding Box</button>
    <button class="tool-btn" id="btn-add-port" title="Add Port">Add Port</button>
    
    <div class="separator"></div>
    
    <button class="tool-btn" id="btn-translate" title="Translate Object (Ctrl+T)">Translate</button>
    
    <div class="separator"></div>
    
    <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
    <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Shift+Y)">Redo</button>
    
    <div class="separator"></div>
    
    <span class="project-info" id="project-name">No project</span>
  </div>
  
  <!-- Main Container -->
  <div id="main-container">
    <!-- Left Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">Objects</div>
      <div id="object-list">
        <!-- Object list items will be added dynamically -->
      </div>
    </div>
    
    <!-- Central Viewport -->
    <div id="viewport">
      <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
        <div id="info-panel">
          <h4>Info</h4>
          <p>Points: <span id="info-points">0</span></p>
          <p>Objects: <span id="info-objects">0</span></p>
          <p>Active Tool: <span id="info-tool">None</span></p>
        </div>
      </div>
      <div id="status-bar">
        <span id="status-coords">Coordinates: 0, 0, 0</span>
      </div>
    </div>
  </div>
  
  <script src="src/workspace.js"></script>
</body>
</html>
